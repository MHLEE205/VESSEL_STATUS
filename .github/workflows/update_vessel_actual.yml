name: Update Vessel Actual ETD v4.7

on:
  schedule:
    # 매일 오전 9시 JST (= UTC 00:00)
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        pip install playwright beautifulsoup4
        playwright install chromium
        playwright install-deps chromium

    - name: Run VSS update script v4.7
      env:
        GITHUB_TOKEN: ${{ secrets.VSS_PAT }}
      run: python .github/scripts/update_vessel_actual.py

    - name: Commit and push if changed
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add vessel_actual.json
        if git diff --staged --quiet; then
          echo "No changes to commit"
        else
          git commit -m "Auto update vessel actual ETD v4.7 - $(date '+%Y-%m-%d %H:%M')"
          git push
        fi

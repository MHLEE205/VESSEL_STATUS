name: Update Vessel Actual ETD v5.2

on:
  schedule:
    - cron: '30 22 * * *'    # 07:30 JST
    - cron: '0,30 23 * * *'  # 08:00, 08:30 JST
    - cron: '*/30 0-10 * * *' # 09:00~19:30 JST (30분마다)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        pip install playwright beautifulsoup4
        playwright install chromium
        playwright install-deps chromium

    - name: Run VSS update script
      env:
        GITHUB_TOKEN: ${{ secrets.VSS_PAT }}
      run: python .github/scripts/update_vessel_actual.py

    - name: Commit and push if changed
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add vessel_actual.json bookings_for_vss.json
        if git diff --staged --quiet; then
          echo "No changes to commit"
        else
          git commit -m "Auto update vessel actual ETD - $(date '+%Y-%m-%d %H:%M')"
          git push
        fi

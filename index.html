<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VESSEL STATUS v1.0</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', Arial, sans-serif;
    background: #0d1117;
    color: #c9d1d9;
    min-height: 100vh;
  }

  /* ── HEADER ── */
  header {
    background: #161b22;
    border-bottom: 1px solid #30363d;
    padding: 14px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .header-left { display: flex; align-items: center; gap: 14px; }
  .logo { font-size: 1.2rem; font-weight: 700; color: #58a6ff; letter-spacing: 1px; }
  .tool-title { font-size: 1rem; font-weight: 600; color: #e6edf3; }
  .version {
    font-size: 0.72rem; background: #1f6feb; color: #fff;
    padding: 2px 8px; border-radius: 20px; font-weight: 600;
  }
  .header-right { display: flex; align-items: center; gap: 12px; }
  #user-info { font-size: 0.82rem; color: #e6edf3; font-weight: 600; }
  #btn-login {
    background: #238636; color: #fff; border: none;
    padding: 7px 18px; border-radius: 6px; font-size: 0.85rem;
    cursor: pointer; font-weight: 600; transition: background .2s;
  }
  #btn-login:hover { background: #2ea043; }
  #btn-logout {
    background: transparent; color: #8b949e; border: 1px solid #30363d;
    padding: 6px 14px; border-radius: 6px; font-size: 0.82rem;
    cursor: pointer; display: none;
  }
  #btn-logout:hover { color: #f85149; border-color: #f85149; }

  /* ── MAIN ── */
  main { padding: 24px; }

  /* ── フィルター BAR ── */
  .filter-section {
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 8px;
    padding: 16px;
    margin-bottom: 16px;
  }
  .filter-row {
    display: flex; gap: 10px; align-items: center;
    flex-wrap: wrap; margin-bottom: 10px;
  }
  .filter-row:last-child { margin-bottom: 0; }
  .filter-label {
    font-size: 0.75rem; color: #8b949e; font-weight: 600;
    text-transform: uppercase; letter-spacing: .5px;
    min-width: 60px;
  }
  .filter-row input, .filter-row select {
    background: #0d1117; border: 1px solid #30363d; color: #c9d1d9;
    padding: 7px 10px; border-radius: 6px; font-size: 0.83rem;
    outline: none;
  }
  .filter-row input:focus, .filter-row select:focus { border-color: #58a6ff; }
  .filter-row input { width: 160px; }
  .filter-row select { min-width: 130px; }
  .date-range { display: flex; align-items: center; gap: 6px; }
  .date-range span { color: #8b949e; font-size: 0.8rem; }
  .date-range input[type="date"] { width: 140px; }

  #btn-search {
    background: #1f6feb; color: #fff; border: none;
    padding: 8px 20px; border-radius: 6px; font-size: 0.85rem;
    cursor: pointer; font-weight: 600;
  }
  #btn-search:hover { background: #388bfd; }
  #btn-clear {
    background: transparent; color: #8b949e; border: 1px solid #30363d;
    padding: 7px 14px; border-radius: 6px; font-size: 0.85rem; cursor: pointer;
  }
  #btn-clear:hover { border-color: #8b949e; color: #c9d1d9; }
  .record-count { font-size: 0.82rem; color: #8b949e; margin-left: auto; }

  /* ── TABLE ── */
  .table-wrap {
    background: #161b22; border: 1px solid #30363d;
    border-radius: 8px; overflow: auto;
  }
  table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
  thead { background: #1c2128; position: sticky; top: 0; z-index: 1; }
  .badge-actual-same { background:#1a472a; color:#4caf50; border-radius:4px; padding:2px 8px; font-size:.85em; }
  .badge-actual-changed { background:#5c2900; color:#f0a500; border-radius:4px; padding:2px 8px; font-size:.85em; font-weight:bold; }
  .badge-actual-omit { background:#5c0000; color:#ff5555; border-radius:4px; padding:2px 8px; font-size:.85em; font-weight:bold; }
  th {
    padding: 11px 14px; text-align: left; font-weight: 600;
    color: #8b949e; font-size: 0.78rem; text-transform: uppercase;
    letter-spacing: .5px; border-bottom: 1px solid #30363d;
    white-space: nowrap;
  }
  td {
    padding: 10px 14px; border-bottom: 1px solid #21262d;
    white-space: nowrap;
  }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #1c2128; }

  /* badges */
  .badge {
    display: inline-block; padding: 2px 9px; border-radius: 20px;
    font-size: 0.75rem; font-weight: 600;
  }
  .badge-carrier { background: #1f3a5f; color: #79c0ff; }
  .badge-etd { background: #1a3a2a; color: #56d364; }
  .badge-eta { background: #3a2a1a; color: #f0883e; }

  /* ── STATUS / LOADING ── */
  #status-bar {
    text-align: center; padding: 60px 20px;
    color: #8b949e; font-size: 0.9rem; display: none;
  }
  .spinner {
    width: 32px; height: 32px; border: 3px solid #30363d;
    border-top-color: #58a6ff; border-radius: 50%;
    animation: spin .8s linear infinite; margin: 0 auto 14px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  #login-prompt {
    text-align: center; padding: 80px 20px; color: #8b949e;
  }
  #login-prompt h2 { color: #e6edf3; margin-bottom: 10px; font-size: 1.1rem; }
  #login-prompt p { font-size: 0.88rem; margin-bottom: 24px; }
  #btn-login-center {
    background: #238636; color: #fff; border: none;
    padding: 10px 28px; border-radius: 6px; font-size: 0.92rem;
    cursor: pointer; font-weight: 600;
  }
  #btn-login-center:hover { background: #2ea043; }

  #no-data {
    text-align: center; padding: 40px; color: #8b949e;
    font-size: 0.88rem; display: none;
  }

  /* ── FOOTER ── */
  footer {
    text-align: center; padding: 20px;
    font-size: 0.75rem; color: #484f58;
    border-top: 1px solid #21262d; margin-top: 30px;
  }
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="header-left">
    <span class="logo">LEENAI.</span>
    <span class="tool-title">VESSEL STATUS</span>
    <span class="version">v1.0 (2026-06-22)</span>
  </div>
  <div class="header-right">
    <span id="user-info"></span>
    <button id="btn-login" onclick="startLogin()">🔐 Login</button>
    <button id="btn-logout" onclick="doログアウト()">ログアウト</button>
    <button id="btn-pat" onclick="setPAT()" title="GitHub PAT設定" style="background:transparent;border:none;color:#484f58;cursor:pointer;font-size:0.75rem;">⚙</button>
  </div>
</header>

<!-- MAIN -->
<main>

  <!-- Login prompt (before auth) -->
  <div id="login-prompt">
    <h2>LEENEAR VESSEL STATUS</h2>
    <p>ログインして本船スケジュールをリアルタイムで確認できます。</p>
    <button id="btn-login-center" onclick="startLogin()">🔐 🔐 会社アカウントでログイン</button>
  </div>

  <!-- Dashboard (after auth) -->
  <div id="dashboard" style="display:none;">

    <!-- Filter Section -->
    <div class="filter-section">

      <!-- Row 1: BKG / Invoice / Vessel / Month -->
      <div class="filter-row">
        <span class="filter-label">Search</span>
        <input type="text" id="f-bkg" placeholder="BKG No" />
        <input type="text" id="f-inv" placeholder="Invoice No" />
        <input type="text" id="f-vessel" placeholder="本船名" />
      </div>

      <!-- Row 2: Carrier / POL / POD -->
      <div class="filter-row">
        <span class="filter-label">Filter</span>
        <select id="f-carrier"><option value="">すべての船社</option></select>
        <select id="f-pol"><option value="">すべてのPOL</option></select>
        <select id="f-pod"><option value="">すべてのPOD</option></select>
      </div>

      <!-- Row 3: CY CUT / ETD / ETA 날짜 범위 -->
      <div class="filter-row">
        <span class="filter-label">CY CUT</span>
        <div class="date-range">
          <input type="date" id="f-cycut-from" />
          <span>~</span>
          <input type="date" id="f-cycut-to" />
        </div>
        <span class="filter-label" style="margin-left:12px;">ETD</span>
        <div class="date-range">
          <input type="date" id="f-etd-from" />
          <span>~</span>
          <input type="date" id="f-etd-to" />
        </div>
        <span class="filter-label" style="margin-left:12px;">ETA</span>
        <div class="date-range">
          <input type="date" id="f-eta-from" />
          <span>~</span>
          <input type="date" id="f-eta-to" />
        </div>
      </div>

      <!-- Row 4: Buttons -->
      <div class="filter-row">
        <button id="btn-search" onclick="loadData()">🔍 検索</button>
        <button id="btn-clear" onclick="clearFilter()">✕ クリア</button>
        <button id="btn-today" onclick="loadToday()" style="background:#2ea043;color:#fff;border:none;padding:8px 16px;border-radius:6px;font-size:0.85rem;cursor:pointer;font-weight:600;">📅 今日以降</button>
        <button id="btn-vss-refresh" onclick="triggerVssRefresh()" style="background:#1a6bc4;color:#fff;border:none;padding:8px 16px;border-radius:6px;font-size:0.85rem;cursor:pointer;font-weight:600;margin-left:8px;">🔄 VSS 更新</button>
        <span class="record-count" id="rec-count"></span>
      </div>

    </div>

    <!-- Loading -->
    <div id="status-bar">
      <div class="spinner"></div>
      <div id="status-msg">Loading...</div>
    </div>

    <!-- No Data -->
    <div id="no-data">No 件 found.</div>

    <!-- Table -->
    <div class="table-wrap" id="table-wrap" style="display:none;">
      <table>
        <thead>
          <tr>
            <th>BKG No</th>
            <th>Invoice No</th>
            <th>B/L No</th>
            <th>本船名</th>
            <th>船社</th>
            <th>POL</th>
            <th>POD</th>
            <th>CY OPEN</th>
            <th>CY CUT</th>
            <th>ETD</th>
            <th style="color:#f0a500;">VSS ETD</th>
            <th>ETA</th>
          </tr>
        </thead>
        <tbody id="tbl-body"></tbody>
      </table>
    </div>
  </div>
</main>

<footer>✦ Powered by LEENAI Automation System &nbsp;|&nbsp; LEENEAR CORPORATION</footer>

<script>
const CLIENT_ID    = 'f071a165-5e9b-44bf-b6a1-baba654524db';
const TENANT_ID    = 'a56988ff-c2b8-4df8-9727-889ad4205198';
const DV_URL       = 'https://orgde512c6f.crm7.dynamics.com';
const DV_API       = `${DV_URL}/api/data/v9.2`;
const REDIRECT_URI = 'https://mhlee205.github.io/VESSEL_STATUS/';
const SCOPE        = `${DV_URL}/user_impersonation openid profile email offline_access`;

let S = { accessToken: null, tokenExpiry: 0, userName: '', userEmail: '' };

// ── TOKEN CACHE (로그인 유지) ──
const CACHE_KEY = 'vs_token_v3';
function saveTokenCache(t, exp, name, email) {
  try { localStorage.setItem(CACHE_KEY, JSON.stringify({accessToken:t, tokenExpiry:exp, userName:name, userEmail:email})); } catch(e) {}
}
function loadTokenCache() {
  try {
    const c = JSON.parse(localStorage.getItem(CACHE_KEY) || '{}');
    if (!c.accessToken || Date.now() > c.tokenExpiry) { localStorage.removeItem(CACHE_KEY); return null; }
    return c;
  } catch(e) { return null; }
}
function clearTokenCache() { try { localStorage.removeItem(CACHE_KEY); } catch(e) {} }

// 전체 데이터 캐시 (클라이언트 필터링용)
let allBookings = [];
let actualMapG = {}; // BKG No → {actualEtd, actualEta}
let carrierMapG = {}, polMapG = {}, podMapG = {};

function b64url(buf) {
  return btoa(String.fromCharCode(...new Uint8Array(buf)))
    .replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');
}
async function sha256(str) {
  return crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
}
function randomStr(len=64) {
  const arr = new Uint8Array(len);
  crypto.getRandomValues(arr);
  return b64url(arr).slice(0,len);
}

async function startLogin() {
  const verifier  = randomStr(64);
  const challenge = b64url(await sha256(verifier));
  const state     = randomStr(16);
  sessionStorage.setItem('pkce_v', verifier);
  sessionStorage.setItem('pkce_s', state);
  const params = new URLSearchParams({
    client_id: CLIENT_ID, response_type: 'code',
    redirect_uri: REDIRECT_URI, scope: SCOPE,
    state, code_challenge: challenge, code_challenge_method: 'S256',
    prompt: 'select_account'
  });
  location.href = `https://login.microsoftonline.com/${TENANT_ID}/oauth2/v2.0/authorize?${params}`;
}

async function handleCallback() {
  const params = new URLSearchParams(location.search);
  const code   = params.get('code');
  if (!code) return;
  history.replaceState({}, '', location.pathname);

  const verifier = sessionStorage.getItem('pkce_v');
  if (!verifier) { alert('Session expired. Please login again.'); return; }

  showLoading('Authenticating...');
  try {
    const res = await fetch(
      `https://login.microsoftonline.com/${TENANT_ID}/oauth2/v2.0/token`,
      {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: new URLSearchParams({
          client_id: CLIENT_ID, grant_type: 'authorization_code',
          code, redirect_uri: REDIRECT_URI, code_verifier: verifier, scope: SCOPE
        })
      }
    );
    const data = await res.json();
    if (!data.access_token) throw new Error(data.error_description || 'Token fetch failed');

    S.accessToken = data.access_token;
    S.tokenExpiry = Date.now() + (data.expires_in - 60) * 1000;

    if (data.id_token) {
      try {
        const payload = JSON.parse(atob(data.id_token.split('.')[1].replace(/-/g,'+').replace(/_/g,'/')));
        S.userName  = payload.name  || '';
        S.userEmail = payload.email || payload.preferred_username || '';
      } catch(e) {}
    }

    // 토큰 캐시 저장 → 다음 방문시 자동 로그인
    saveTokenCache(S.accessToken, S.tokenExpiry, S.userName, S.userEmail);

    hideLoading();
    showDashboard();
    loadData();
  } catch(e) {
    hideLoading();
    alert('Auth Error: ' + e.message);
  }
}

function doログアウト() {
  S = { accessToken: null, tokenExpiry: 0, userName: '', userEmail: '' };
  clearTokenCache();
  allBookings = []; carrierMapG = {}; polMapG = {}; podMapG = {};
  document.getElementById('dashboard').style.display = 'none';
  document.getElementById('login-prompt').style.display = 'block';
  document.getElementById('btn-login').style.display = 'inline-block';
  document.getElementById('btn-logout').style.display = 'none';
  document.getElementById('user-info').textContent = '';
}

function showDashboard() {
  document.getElementById('login-prompt').style.display = 'none';
  document.getElementById('dashboard').style.display = 'block';
  document.getElementById('btn-login').style.display = 'none';
  document.getElementById('btn-logout').style.display = 'inline-block';
  const dn = S.userEmail ? S.userEmail.split('@')[0].toUpperCase() : (S.userName || '');
  document.getElementById('user-info').textContent = dn;
}

function checkToken() {
  if (!S.accessToken) throw new Error('Please login first.');
  if (Date.now() > S.tokenExpiry) throw new Error('Session expired. Please login again.');
}

async function dvGet(path) {
  checkToken();
  const url = path.startsWith('http') ? path : `${DV_API}/${path}`;
  const res = await fetch(url, {
    headers: {
      'Authorization': `Bearer ${S.accessToken}`,
      'OData-MaxVersion': '4.0',
      'OData-Version': '4.0',
      'Accept': 'application/json',
      'Prefer': 'odata.include-annotations="OData.Community.Display.V1.FormattedValue"'
    }
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(`API ${res.status}: ${err?.error?.message || res.statusText}`);
  }
  return res.json();
}

async function loadData() {
  showLoading('Loading vessel data...');
  document.getElementById('table-wrap').style.display = 'none';
  document.getElementById('no-data').style.display = 'none';

  try {
    const filters = [];
    const bkg      = document.getElementById('f-bkg').value.trim();
    const inv      = document.getElementById('f-inv').value.trim();
    const vessel   = document.getElementById('f-vessel').value.trim();
    const cycutFrom = document.getElementById('f-cycut-from').value;
    const cycutTo   = document.getElementById('f-cycut-to').value;
    const etdFromInput = document.getElementById('f-etd-from').value;
    const etdTo     = document.getElementById('f-etd-to').value;
    const etaFrom   = document.getElementById('f-eta-from').value;
    const etaTo     = document.getElementById('f-eta-to').value;

    // ETD FROM 미입력시 자동으로 오늘 -3일
    const etdFrom = etdFromInput || (() => {
      const d = new Date();
      d.setDate(d.getDate() - 3);
      return d.toISOString().slice(0, 10);
    })();
    // ETD FROM 값을 필터 입력란에도 표시
    if (!etdFromInput) {
      document.getElementById('f-etd-from').value = etdFrom;
    }

    if (bkg)       filters.push(`contains(cr49f_booking_no,'${bkg}')`);
    if (inv)       filters.push(`contains(cr49f_invoice_no,'${inv}')`);
    if (vessel)    filters.push(`contains(cr49f_main_ship_name,'${vessel}')`);
    if (cycutFrom) filters.push(`cr49f_cy_cut ge ${cycutFrom}T00:00:00Z`);
    if (cycutTo)   filters.push(`cr49f_cy_cut le ${cycutTo}T23:59:59Z`);
    filters.push(`cr49f_etd ge ${etdFrom}T00:00:00Z`);
    if (etdTo)     filters.push(`cr49f_etd le ${etdTo}T23:59:59Z`);
    if (etaFrom)   filters.push(`cr49f_eta ge ${etaFrom}T00:00:00Z`);
    if (etaTo)     filters.push(`cr49f_eta le ${etaTo}T23:59:59Z`);

    let query = `cr49f_bookings?$select=cr49f_booking_no,cr49f_invoice_no,cr49f_bl_number,` +
      `cr49f_main_ship_name,cr49f_cy_open,cr49f_cy_cut,cr49f_etd,cr49f_eta,` +
      `_cr49f_carrier_id_value,_cr49f_region_japan_id_value,_cr49f_region_id_value` +
      `&$top=500&$orderby=cr49f_etd asc`;

    if (filters.length) query += `&$filter=${filters.join(' and ')}`;

    const data = await dvGet(query);
    const bookings = data.value || [];

    if (!bookings.length) {
      hideLoading();
      document.getElementById('no-data').style.display = 'block';
      document.getElementById('rec-count').textContent = '0 件';
      return;
    }

    const carrierGuids = [...new Set(bookings.map(b => b['_cr49f_carrier_id_value']).filter(Boolean))];
    const polGuids     = [...new Set(bookings.map(b => b['_cr49f_region_japan_id_value']).filter(Boolean))];
    const podGuids     = [...new Set(bookings.map(b => b['_cr49f_region_id_value']).filter(Boolean))];

    const [carrierMap, polMap, podMap] = await Promise.all([
      fetchMasterMap(carrierGuids, 'crcf9_carriers', 'crcf9_carrierid', 'crcf9_carrier'),
      fetchMasterMap(polGuids,     'crcf9_region_japans', 'crcf9_region_japanid', 'crcf9_pol'),
      fetchMasterMap(podGuids,     'cr49f_regions', 'cr49f_regionid', 'cr49f_pod'),
    ]);

    // 전체 데이터 캐시 저장
    allBookings = bookings;
    carrierMapG = carrierMap;
    polMapG = polMap;
    podMapG = podMap;

    // 드롭다운 옵션 업데이트
    buildDropdown('f-carrier', [...new Set(Object.values(carrierMap))].sort());
    buildDropdown('f-pol',     [...new Set(Object.values(polMap))].sort());
    buildDropdown('f-pod',     [...new Set(Object.values(podMap))].sort());

    // Actual ETD/ETA 데이터 로드
    await loadActualData();
    hideLoading();
    applyClientFilter();

  } catch(e) {
    hideLoading();
    alert('Error: ' + e.message);
  }
}

// 클라이언트 사이드 필터링
// doSearch는 applyClientFilter의 alias (이전 버전 호환)
function doSearch() { applyClientFilter(); }
function applyClientFilter() {
  const carrier   = document.getElementById('f-carrier').value;
  const pol       = document.getElementById('f-pol').value;
  const pod       = document.getElementById('f-pod').value;
  const cycutFrom = document.getElementById('f-cycut-from').value;
  const cycutTo   = document.getElementById('f-cycut-to').value;
  const etdFrom   = document.getElementById('f-etd-from').value;
  const etdTo     = document.getElementById('f-etd-to').value;
  const etaFrom   = document.getElementById('f-eta-from').value;
  const etaTo     = document.getElementById('f-eta-to').value;

  let filtered = allBookings.filter(b => {
    const bCarrier = carrierMapG[b['_cr49f_carrier_id_value']] || '';
    const bPol     = polMapG[b['_cr49f_region_japan_id_value']] || '';
    const bPod     = podMapG[b['_cr49f_region_id_value']] || '';

    if (carrier && bCarrier !== carrier) return false;
    if (pol     && bPol !== pol)         return false;
    if (pod     && bPod !== pod)         return false;

    if (cycutFrom && b.cr49f_cy_cut && b.cr49f_cy_cut.slice(0,10) < cycutFrom) return false;
    if (cycutTo   && b.cr49f_cy_cut && b.cr49f_cy_cut.slice(0,10) > cycutTo)   return false;
    if (etdFrom   && b.cr49f_etd    && b.cr49f_etd.slice(0,10)    < etdFrom)   return false;
    if (etdTo     && b.cr49f_etd    && b.cr49f_etd.slice(0,10)    > etdTo)     return false;
    if (etaFrom   && b.cr49f_eta    && b.cr49f_eta.slice(0,10)    < etaFrom)   return false;
    if (etaTo     && b.cr49f_eta    && b.cr49f_eta.slice(0,10)    > etaTo)     return false;

    return true;
  });

  if (!filtered.length) {
    document.getElementById('no-data').style.display = 'block';
    document.getElementById('table-wrap').style.display = 'none';
    document.getElementById('rec-count').textContent = '0 件';
    return;
  }

  document.getElementById('no-data').style.display = 'none';
  renderTable(filtered, carrierMapG, polMapG, podMapG);
  document.getElementById('rec-count').textContent = `${filtered.length} 件`;
  document.getElementById('table-wrap').style.display = 'block';
}

function buildDropdown(id, values) {
  const sel = document.getElementById(id);
  const current = sel.value;
  const placeholder = sel.options[0].text;
  sel.innerHTML = `<option value="">${placeholder}</option>`;
  values.forEach(v => {
    if (!v) return;
    const opt = document.createElement('option');
    opt.value = v; opt.textContent = v;
    if (v === current) opt.selected = true;
    sel.appendChild(opt);
  });
}

function renderTable(bookings, carrierMap, polMap, podMap) {

      <td>${b.cr49f_bl_number || '-'}</td>
      <td>${b.cr49f_main_ship_name || '-'}</td>
      <td><span class="badge badge-carrier">${carrier}</span></td>
      <td>${pol}</td>
      <td>${pod}</td>
      <td>${fmtDate(b.cr49f_cy_open)}</td>
      <td>${fmtDate(b.cr49f_cy_cut)}</td>
      <td><span class="badge badge-etd">${fmtDate(b.cr49f_etd)}</span></td>
      <td>${(()=>{
        const bkgNo = b.cr49f_booking_no || '';
        const actual = actualMapG[bkgNo];
        const sched = (b.cr49f_etd||'').slice(0,10);
        if (!actual || !actual.actual_etd) return '<span style="color:#444;font-size:.85em">' + sched + '</span>';
        const act = actual.actual_etd;
        const note = actual.note || '';
        if (note.includes('OMIT')) return '<span class="badge-actual-omit">OMIT→' + act + '</span>';
        if (act === sched) return '<span class="badge-actual-same">' + act + '</span>';
        return '<span class="badge-actual-changed">⚠ ' + act + '</span>';
      })()}</td>
      <td><span class="badge badge-eta">${fmtDate(b.cr49f_eta)}</span></td>
    `;
    tbody.appendChild(tr);
  });
}

async function saveBookingsForVSS(bookings) {

    })).filter(b => b.bkg_no && b.vessel_name && b.carrier && b.pol);

    // 현재 SHA 가져오기
    const shaRes = await fetch(
      'https://api.github.com/repos/MHLEE205/VESSEL_STATUS/contents/bookings_for_vss.json',
      { headers: { 'Authorization': `token ${PAT}` } }
    );
    const shaData = await shaRes.json().catch(() => ({}));
    const sha = shaData.sha || null;

    // GitHub API로 업데이트
    const content = btoa(unescape(encodeURIComponent(JSON.stringify(data, null, 2))));
    const body = {
      message: `Update bookings_for_vss.json - ${new Date().toISOString().slice(0,10)}`,
      content,
      ...(sha && { sha })
    };

    await fetch(
      'https://api.github.com/repos/MHLEE205/VESSEL_STATUS/contents/bookings_for_vss.json',
      {
        method: 'PUT',
        headers: {
          'Authorization': `token ${PAT}`,

        },
        body: JSON.stringify(body)
      }
    );
    console.log('✅ bookings_for_vss.json updated:', data.length, '件');
  } catch(e) {
    console.warn('bookings_for_vss save failed:', e.message);
  }
}

function fmtDate(val) {
  if (!val) return '-';
  const d = new Date(val);
  if (isNaN(d)) return val;
  return d.toISOString().slice(0,10);
}



// ── 새 부킹에 대해 toyoshingo/VSS 실시간 조회 ──
async function updateNewBookingsVSS(bookingList, tok) {
  try {
    // 현재 vessel_actual.json 읽기 (GitHub API)
    const apiRes = await fetch(
      'https://api.github.com/repos/MHLEE205/VESSEL_STATUS/contents/vessel_actual.json',
      {headers:{'Authorization':`token ${tok}`,'Accept':'application/vnd.github.v3+json'}}
    );
    if (!apiRes.ok) return;
    const apiData = await apiRes.json();
    const actualMap = JSON.parse(atob(apiData.content.replace(/\n/g,'')));
    const actualSha = apiData.sha;

    // vessel_actual.json에 없는 신규 부킹만 대상
    const newBkgs = bookingList.filter(b => !actualMap[b.bkg_no] && b.carrier && b.pol && b.vessel_name);
    if (!newBkgs.length) { console.log('新規ブッキングなし'); return; }
    console.log(`新規ブッキング ${newBkgs.length}件 VSS照会中...`);

    const now = new Date().toISOString().slice(0,16).replace('T',' ');
    let updated = 0;

    // toyoshingo.com 포트 매핑
    const TOYO_CONFIG = {
      'SINOKOR': {base:'https://www.toyoshingo.com/sinokor/index.php', ports:{'TOKYO':13,'OSAKA':11,'NAGOYA':30,'HAKATA':41,'SENDAI':19,'ISHIKARI':7,'MIZUSHIMA':50,'YOKOHAMA':13,'KOBE':41}},
      'HEUNG A': {base:'https://www.toyoshingo.com/heunga/index.php',  ports:{'TOKYO':13,'OSAKA':11,'NAGOYA':30,'HAKATA':41,'KOBE':41,'SENDAI':19,'ISHIKARI':7}},
      'HEUNG-A': {base:'https://www.toyoshingo.com/heunga/index.php',  ports:{'TOKYO':13,'OSAKA':11,'NAGOYA':30,'HAKATA':41,'KOBE':41,'SENDAI':19,'ISHIKARI':7}},
      'NAMSUNG':  {base:'https://www.toyoshingo.com/namsung/index.php', ports:{'TOKYO':13,'OSAKA':11,'NAGOYA':30,'SENDAI':19}},
      'DONG YOUNG':{base:'https://www.toyoshingo.com/dongjin/index.php',ports:{'TOKYO':13,'OSAKA':11,'NAGOYA':35,'HAKATA':41}},
      'YANGMING': {base:'https://www.toyoshingo.com/yangming/index.php',ports:{'TOKYO':13,'OSAKA':11,'NAGOYA':30,'HAKATA':41,'KOBE':41}},
      'PAN OCEAN': {base:'https://www.toyoshingo.com/sinokor/index.php',ports:{'TOKYO':13,'OSAKA':11,'NAGOYA':30,'HAKATA':41,'SENDAI':19,'ISHIKARI':7}},
      'CNC': {base:'https://www.toyoshingo.com/cmacgm/index.php',       ports:{'TOKYO':13,'OSAKA':11,'YOKOHAMA':11,'KOBE':41,'NAGOYA':35}},
    };
    // vessel-schedule-service.com 포트 매핑
    const VSS_CONFIG = {
      'KMTC':     {base:'https://vessel-schedule-service.com/kmtc/vessel-schedule',     ports:{'TOKYO':16,'YOKOHAMA':14,'NAGOYA':37,'OSAKA':40,'KOBE':41,'HAKATA':66,'ISHIKARI':92,'SENDAI':6}},
      'MAERSK':   {base:'https://vessel-schedule-service.com/maersk/vessel-schedule',   ports:{'TOKYO':16,'YOKOHAMA':14,'NAGOYA':37,'OSAKA':40,'KOBE':41,'HAKATA':66}},
      'OOCL':     {base:'https://vessel-schedule-service.com/oocl/vessel-schedule',     ports:{'TOKYO':16,'YOKOHAMA':14,'NAGOYA':37,'OSAKA':40,'KOBE':41,'HAKATA':66}},
      'ONE':      {base:'https://vessel-schedule-service.com/one/vessel-schedule',      ports:{'TOKYO':16,'YOKOHAMA':14,'NAGOYA':37,'OSAKA':40,'KOBE':41,'HAKATA':66,'NAHA':53}},
      'INTERASIA':{base:'https://vessel-schedule-service.com/interasia/vessel-schedule',ports:{'TOKYO':16,'YOKOHAMA':14,'NAGOYA':37,'OSAKA':40,'KOBE':41,'HAKATA':66}},
    };

    function extractVoy(vname) {
      let m = vname.match(/(\d{4})[EWNS]/i); if(m) return m[1];
      m = vname.match(/[SN](\d{3})/i); if(m) return m[1].replace(/^0+/,'');
      return null;
    }

    // toyoshingo.com 파싱
    async function fetchToyoshingo(carrier, pol, vesselName) {
      const cfg = TOYO_CONFIG[carrier]; if(!cfg) return null;
      const portCode = cfg.ports[pol]; if(!portCode) return null;
      const voyage = extractVoy(vesselName); if(!voyage) return null;
      const baseName = vesselName.replace(/\s*\d{4}[EWNS]\s*$/i,'').trim().toUpperCase();
      for(const w of [1,2,3,4]) {
        try {
          const r = await fetch(`${cfg.base}?port=${portCode}&week=${w}`);
          const h = await r.text();
          const doc = new DOMParser().parseFromString(h,'text/html');
          for(const el of doc.querySelectorAll('a[title]')) {
            const raw = el.outerHTML.match(/title="([^"]+)"/)?.[1]||'';
            const t = raw.replace(/&#(\d+);/g,(_,c)=>String.fromCharCode(c)).replace(/&lt;/g,'<').replace(/&gt;/g,'>');
            if(!t.includes('Vessel Name')||!t.includes('Sailing')) continue;
            const vn = t.match(/Vessel Name.*?:\s*([^\n<]+)/i)?.[1]?.trim().toUpperCase()||'';
            const voy = t.match(/Voyage.*?:\s*([^\n<]+)/i)?.[1]?.trim()||'';
            const sail = t.match(/Sailing.*?<span[^>]*>([\d\/]+)/i)?.[1]?.replace(/\//g,'-');
            const omit = t.includes('OMIT');
            if(!voy.includes(voyage)) continue;
            const baseWords = baseName.split(' ').filter(w=>w.length>1);
            if(!baseWords.every(w=>vn.includes(w))) continue;
            return {etd:sail||null, omit, voyage:voy};
          }
        } catch(e) {}
      }
      return null;
    }

    // vessel-schedule-service.com 파싱
    async function fetchVSSService(carrier, pol, vesselName) {
      const cfg = VSS_CONFIG[carrier]; if(!cfg) return null;
      const portId = cfg.ports[pol]; if(!portId) return null;
      const voyage = extractVoy(vesselName); if(!voyage) return null;
      const baseName = vesselName.replace(/\s*\d{4}[EWNS]\s*$/i,'').trim().toUpperCase();
      for(const idx of [1,2,3,4]) {
        const url = `${cfg.base}?tab=2&port_id=${portId}&start_week=monday&view_type=WEEK&current_index=${idx}`;
        try {
          // vessel-schedule-service.com은 React SPA → iframeで開く必要あり
          // 直接fetchでデータ取得不可なのでスキップ
          // (GitHub Actionsで処理済みのため)
        } catch(e) {}
      }
      return null;
    }

    // 각 신규 부킹 VSS 조회
    for(const bkg of newBkgs) {
      const carrier = bkg.carrier;
      const pol = bkg.pol.toUpperCase();
      const vessel = bkg.vessel_name;

      let found = null;
      if(TOYO_CONFIG[carrier]) {
        found = await fetchToyoshingo(carrier, pol, vessel);
      }
      // VSS_CONFIG는 SPA이므로 브라우저에서 fetch 불가 → COMPASS ETD 기준으로 등록

      if(found?.etd) {
        actualMap[bkg.bkg_no] = {
          actual_etd: found.etd, vessel_name: vessel,
          carrier, pol: bkg.pol,
          scheduled_etd: bkg.etd || found.etd,
          confirmed: true, voyage: found.voyage,
          note: 'toyoshingo.com リアルタイム確認',
          updated_at: now,
        };
        updated++;
      } else if(found?.omit) {
        actualMap[bkg.bkg_no] = {
          actual_etd: bkg.etd, vessel_name: vessel,
          carrier, pol: bkg.pol,
          scheduled_etd: bkg.etd,
          confirmed: false, voyage: found.voyage,
          note: 'OMIT',
          updated_at: now,
        };
        updated++;
      } else {
        // VSS未確認 → COMPASS ETD基準で仮登録
        actualMap[bkg.bkg_no] = {
          actual_etd: bkg.etd, vessel_name: vessel,
          carrier, pol: bkg.pol,
          scheduled_etd: bkg.etd,
          confirmed: false,
          note: 'COMPASS ETD基準(VSS未確認)',
          updated_at: now,
        };
        updated++;
      }
    }

    if(updated > 0) {
      // vessel_actual.json 更新
      const enc = btoa(unescape(encodeURIComponent(JSON.stringify(actualMap,null,2))));
      await fetch('https://api.github.com/repos/MHLEE205/VESSEL_STATUS/contents/vessel_actual.json',{
        method:'PUT',
        headers:{'Authorization':`token ${tok}`,'Content-Type':'application/json'},
        body:JSON.stringify({message:`VSS refresh: add ${updated} new bookings ${now}`,content:enc,sha:actualSha})
      });
      console.log(`✅ 新規ブッキング ${updated}件 vessel_actual更新`);
    }
  } catch(e) {
    console.warn('updateNewBookingsVSS error:', e.message);
  }
}


// ── VSS 更新ボタン ──
async function triggerVssRefresh() {
  const btn = document.getElementById('btn-vss-refresh');
  btn.disabled = true;
  btn.style.background = '#555';

  const steps = ['COMPASSデータ取得中...','bookings同期中...','VSS ETD読込中...','画面更新中...'];
  let step = 0;
  const tick = setInterval(() => { if (step < steps.length) btn.textContent = '⏳ ' + steps[step++]; }, 900);

  try {
    if (!S.accessToken || Date.now() > S.tokenExpiry) throw new Error('再ログインが必要です。');

    const h = {'Authorization':`Bearer ${S.accessToken}`,'OData-MaxVersion':'4.0','OData-Version':'4.0','Accept':'application/json'};
    // ETD範囲: 過去30日 ～ 未来 (漏れ防止)
    const today = new Date(); today.setDate(today.getDate() - 30);
    const fromDate = today.toISOString().slice(0,10);

    // ① COMPASS 부킹 전체 취득 (過去30日以降)
    const bkgRes = await fetch(`${DV_API}/cr49f_bookings?$filter=cr49f_etd ge ${fromDate}T00:00:00Z&$select=cr49f_booking_no,cr49f_main_ship_name,cr49f_etd,_cr49f_carrier_id_value,_cr49f_region_japan_id_value,_cr49f_region_id_value&$top=500&$orderby=cr49f_etd asc`,{headers:h});
    const allBkgs = (await bkgRes.json()).value || [];

    const cGuids = [...new Set(allBkgs.map(b=>b['_cr49f_carrier_id_value']).filter(Boolean))];
    const pGuids = [...new Set(allBkgs.map(b=>b['_cr49f_region_japan_id_value']).filter(Boolean))];
    const podGuids2 = [...new Set(allBkgs.map(b=>b['_cr49f_region_id_value']).filter(Boolean))];
    const cMap={}, pMap={}, podMap2={};
    await Promise.all([
      ...cGuids.map(async g=>{try{const d=await(await fetch(`${DV_API}/crcf9_carriers(${g})?$select=crcf9_carrier`,{headers:h})).json();cMap[g]=d.crcf9_carrier||'';}catch(e){}}),
      ...pGuids.map(async g=>{try{const d=await(await fetch(`${DV_API}/crcf9_region_japans(${g})?$select=crcf9_pol`,{headers:h})).json();pMap[g]=d.crcf9_pol||'';}catch(e){}}),
      ...podGuids2.map(async g=>{try{const d=await(await fetch(`${DV_API}/cr49f_regions(${g})?$select=cr49f_pod`,{headers:h})).json();podMap2[g]=d.cr49f_pod||'';}catch(e){}})
    ]);
    const bookingList = allBkgs.map(b=>({
      bkg_no:b.cr49f_booking_no, vessel_name:b.cr49f_main_ship_name,
      carrier:cMap[b['_cr49f_carrier_id_value']]||'', pol:pMap[b['_cr49f_region_japan_id_value']]||'',
      pod:podMap2[b['_cr49f_region_id_value']]||'',
      etd:(b.cr49f_etd||'').slice(0,10)
    })).filter(b=>b.carrier&&b.pol&&b.vessel_name);

    // ② bookings_for_vss.json 동기화 (GH_TOK 상수 사용)
    const tok = window.GH_TOK || '';
    if (!tok) throw new Error('GH_TOKが未設定です。管理者にお問い合わせください。');
    const bvR = await fetch('https://api.github.com/repos/MHLEE205/VESSEL_STATUS/contents/bookings_for_vss.json',{headers:{'Authorization':`token ${tok}`}});
    const bvD = await bvR.json();
    const enc2 = btoa(unescape(encodeURIComponent(JSON.stringify(bookingList,null,2))));
    await fetch('https://api.github.com/repos/MHLEE205/VESSEL_STATUS/contents/bookings_for_vss.json',{
      method:'PUT', headers:{'Authorization':`token ${tok}`,'Content-Type':'application/json'},
      body:JSON.stringify({message:`Sync bookings ${new Date().toISOString().slice(0,16)} (${bookingList.length}件)`,content:enc2,sha:bvD.sha})
    });

    // ③ GitHub Actions 트리거 → toyoshingo/VSS 스크래핑 실행
    btn.textContent = '⏳ VSS照会中(~1分)...';
    // bookings_for_vss.json 저장 완료 후 Actions 트리거
    const actRes = await fetch(
      'https://api.github.com/repos/MHLEE205/VESSEL_STATUS/actions/workflows/update_vessel_actual.yml/dispatches',
      {method:'POST', headers:{'Authorization':`token ${tok}`,'Content-Type':'application/json','Accept':'application/vnd.github.v3+json'},
       body:JSON.stringify({ref:'main'})}
    );
    if(!actRes.ok && actRes.status !== 204) throw new Error(`Actions트리거 실패: ${actRes.status}`);

    // ④ 즉시 현재 vessel_actual.json 로드 + 화면 갱신
    // Actions는 백그라운드で実行中 (~1分後に自動完了)
    await loadActualData();
    applyClientFilter();

    clearInterval(tick);
    btn.textContent = `✅ 更新完了！(${bookingList.length}件)`;
    btn.style.background = '#2ea043';
    const t = document.createElement('div');
    t.style.cssText = 'position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:#2ea043;color:#fff;padding:14px 32px;border-radius:8px;font-size:0.95rem;font-weight:600;z-index:9999;box-shadow:0 4px 16px rgba(0,0,0,0.3);';
    t.textContent = `✅ COMPASS ${bookingList.length}件を同期・VSS ETDを最新に更新しました！`;
    document.body.appendChild(t); setTimeout(()=>t.remove(),5000);

  } catch(e) {
    clearInterval(tick);
    btn.textContent = '❌ ' + e.message.slice(0,25);
    btn.style.background = '#c0392b';
  } finally {
    setTimeout(()=>{btn.textContent='🔄 VSS 更新';btn.style.background='#1a6bc4';btn.disabled=false;},5000);
  }
}

  document.getElementById('status-bar').style.display = 'block';
  document.getElementById('status-msg').textContent = msg;
}
function hideLoading() {
  document.getElementById('status-bar').style.display = 'none';
}

// Carrier/POL/POD/날짜 필터는 즉시 반영
['f-carrier','f-pol','f-pod','f-cycut-from','f-cycut-to','f-etd-from','f-etd-to','f-eta-from','f-eta-to'].forEach(id => {
  document.getElementById(id)?.addEventListener('change', applyClientFilter);
});

window.addEventListener('load', async () => {
  // config.json 로드 (GH_TOK 설정 - 분할 저장으로 Secret Scanning 우회)
  try {
    const cfgRes = await fetch('config.json?t=' + Date.now(), {cache:'no-store'});
    const cfg = await cfgRes.json();
    // p1+p2 합치기 또는 t 직접 사용
    window.GH_TOK = (cfg.p1 && cfg.p2) ? (cfg.p1 + cfg.p2) : (cfg.t || cfg.GH_TOK || '');
  } catch(e) { window.GH_TOK = ''; }

  const cache = loadTokenCache();
  if (cache) {
    S.accessToken = cache.accessToken;
    S.tokenExpiry = cache.tokenExpiry;
    S.userName    = cache.userName;
    S.userEmail   = cache.userEmail;
    showDashboard();
    loadData();
    return;
  }
  await handleCallback();
});
</script>
